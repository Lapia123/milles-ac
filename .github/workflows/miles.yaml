name: Sync Subfolders

on:
  push:
    branches: [ main ]

jobs:
  sync-frontend:
    if: contains(join(github.event.commits.*.modified, ','), 'frontend/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.SYNC_TOKEN }}
        with:
          source-directory: 'frontend'
          destination-github-username: 'Abshar777'
          destination-repository-name: 'miles-backoffice-frontend'
          user-email: absharameen625@gmail.com
          target-branch: main

  sync-backend:
    if: contains(join(github.event.commits.*.modified, ','), 'backend/server.py')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.SYNC_TOKEN }}
        with:
          source-directory: 'backend'
          destination-github-username: 'Abshar777'
          destination-repository-name: 'milescapitals-backoffice-backend'
          user-email: absharameen625@gmail.com
          target-branch: main
